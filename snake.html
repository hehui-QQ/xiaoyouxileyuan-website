<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>梦幻贪吃蛇 · 精致按键</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1b0f2a 0%, #2e1a3a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Quicksand', 'Segoe UI', sans-serif;
            padding: 8px;
        }

        .game-wrapper {
            background: rgba(255, 240, 250, 0.15);
            backdrop-filter: blur(6px);
            border-radius: 48px 48px 36px 36px;
            padding: 20px 16px 24px 16px;
            box-shadow: 0 30px 40px -15px rgba(0,0,0,0.5), 0 0 0 2px rgba(255, 220, 240, 0.3) inset, 0 0 30px #ffb3ff66;
            width: fit-content;
            max-width: 100%;
        }

        .canvas-container {
            position: relative;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 20px 30px -10px black, 0 0 40px #ffaae6b0;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            max-width: 800px;
            aspect-ratio: 800 / 600;
            background: transparent;
            cursor: pointer;
            touch-action: none;
        }

        /* 顶部信息栏 */
        .stats-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 8px;
            gap: 10px;
        }

        .score-box {
            background: rgba(255, 245, 255, 0.2);
            backdrop-filter: blur(12px);
            padding: 8px 18px;
            border-radius: 40px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 5px 15px rgba(255, 200, 255, 0.5);
            font-size: 22px;
            font-weight: 700;
            color: #fef6ff;
            text-shadow: 0 2px 5px #ffa0d0;
            white-space: nowrap;
        }

        .high-box {
            background: rgba(255, 235, 190, 0.25);
            backdrop-filter: blur(12px);
            padding: 8px 18px;
            border-radius: 40px;
            border: 2px solid #fff6cf;
            box-shadow: 0 0 20px #ffd966;
            font-size: 20px;
            color: #fffbc2;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .high-box span {
            font-weight: 600;
        }

        .history-box {
            font-size: 18px;
            color: #ffdeb0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .history-icons {
            display: flex;
            gap: 6px;
        }

        .history-icon {
            width: 30px;
            height: 30px;
            background: rgba(255,255,200,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #ffdcaa;
            color: #fff2b5;
            font-weight: bold;
            font-size: 16px;
        }

        .difficulty-panel {
            display: flex;
            gap: 10px;
            margin-left: auto;
        }

        .difficulty-btn {
            background: rgba(255, 220, 250, 0.3);
            backdrop-filter: blur(4px);
            border: 2px solid #ffccee;
            color: #fff3fd;
            font-size: 18px;
            font-weight: 600;
            padding: 6px 16px;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 4px 0 #b38faa, 0 6px 12px black;
            transition: 0.08s linear;
            text-shadow: 0 2px 3px #a54b7b;
        }

        .difficulty-btn.active {
            background: #fcd0ff;
            color: #411c30;
            border-color: #fff0b5;
            box-shadow: 0 2px 0 #a06b8a, 0 8px 18px #ffb3f0;
            transform: translateY(2px);
        }

        .control-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding: 0 8px;
        }

        .button-group {
            display: flex;
            gap: 25px;
        }

        .mushroom-btn {
            position: relative;
            width: 90px;
            height: 90px;
            border: none;
            background: none;
            cursor: pointer;
            filter: drop-shadow(0 12px 12px rgba(0, 0, 0, 0.2));
            transition: transform 0.15s ease;
        }
        .mushroom-btn:active { transform: translateY(6px) scale(0.98); }
        .mushroom-cap {
            position: absolute; width: 100%; height: 70%;
            background: radial-gradient(circle at 35% 35%, #ffb2b2, #e35f5f);
            border-radius: 50% 50% 40% 40% / 60% 60% 30% 30%;
            top: 0; left: 0;
            box-shadow: 0 8px 0 #8b3f3f, 0 12px 18px rgba(255, 160, 160, 0.7), 0 0 0 4px #fff8e7 inset;
            border: 2px solid #fff9e6;
        }
        .mushroom-cap.blue {
            background: radial-gradient(circle at 35% 35%, #aad0ff, #4f7eb3);
            box-shadow: 0 8px 0 #2d4b6e, 0 12px 18px rgba(160, 210, 255, 0.7), 0 0 0 4px #e7f3ff inset;
        }
        .mushroom-spot {
            position: absolute; background: #fffde7; border-radius: 60% 40% 50% 50%;
            box-shadow: 0 0 0 2px #ffffffaa, 0 0 8px white;
        }
        .spot1 { width: 18px; height: 22px; top: 15px; left: 18px; transform: rotate(-15deg); }
        .spot2 { width: 16px; height: 20px; top: 35px; right: 20px; transform: rotate(10deg); }
        .spot3 { width: 14px; height: 18px; bottom: 20px; left: 25px; background: #ffffffdd; }
        .mushroom-stem {
            position: absolute; width: 38px; height: 34px;
            background: linear-gradient(145deg, #f3e3cb, #dbb78c);
            bottom: 5px; left: 26px;
            border-radius: 40% 40% 30% 30% / 70% 70% 20% 20%;
            box-shadow: 0 8px 0 #9c7b5b, 0 0 0 3px #fff9e9 inset;
            border: 1px solid #ffeac2;
            z-index: -1;
        }
        .btn-label {
            position: absolute; bottom: -25px; left: 50%; transform: translateX(-50%);
            font-size: 16px; font-weight: 700; color: #fffbee;
            text-shadow: 0 3px 0 #a0577a, 0 0 12px #ffbfe0;
            white-space: nowrap;
        }

        /* ========= 十字形虚拟按键 - 精致样式 ========= */
        .virtual-pad {
            display: grid;
            grid-template-rows: auto auto auto;
            grid-template-columns: 1fr auto 1fr;
            gap: 15px;                     /* 按键间距15px */
            justify-items: center;
            align-items: center;
            margin-top: 28px;
            padding: 5px;
        }

        .virtual-btn {
            width: 50px;
            height: 50px;
            background: rgba(42, 27, 61, 0.8);  /* 半透明深紫色 */
            backdrop-filter: blur(4px);
            border: 2px solid rgba(255, 215, 0, 0.6);  /* 浅金色边框 */
            border-radius: 50%;
            display: flex;
            align-items: center;            /* 垂直居中 */
            justify-content: center;        /* 水平居中 */
            font-size: 28px;                /* 图标大小适中，确保居中 */
            color: white;
            box-shadow: 0 6px 10px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 200, 0.2) inset;
            transition: all 0.1s ease;
            cursor: pointer;
            touch-action: manipulation;
            user-select: none;
            -webkit-touch-callout: none;
            line-height: 1;                  /* 防止字符偏移 */
        }

        /* 按下效果 */
        .virtual-btn:active {
            transform: scale(0.95);
            background: rgba(0, 255, 136, 0.7);  /* 半透明亮绿色 */
            border-color: rgba(255, 255, 255, 0.8);
            color: white;
            box-shadow: 0 0 20px #88ffaa;
        }

        /* 定位各个按键到十字位置 */
        .virtual-btn.up {
            grid-row: 1;
            grid-column: 2;
        }
        .virtual-btn.left {
            grid-row: 2;
            grid-column: 1;
        }
        .virtual-btn.right {
            grid-row: 2;
            grid-column: 3;
        }
        .virtual-btn.down {
            grid-row: 3;
            grid-column: 2;
        }
        .virtual-btn.pause {
            grid-row: 2;
            grid-column: 2;
            font-size: 30px;                 /* 暂停符号稍大，但仍在框内居中 */
        }

        /* 游戏结束浮层 */
        .gameover-message {
            position: absolute; top: 30%; left: 50%; transform: translateX(-50%);
            background: rgba(45, 20, 50, 0.7); backdrop-filter: blur(12px);
            padding: 24px 45px; border-radius: 90px;
            border: 3px solid #ffeaf5; box-shadow: 0 0 50px #ffb0f0;
            color: #fffbe3; font-size: 42px; font-weight: 800;
            text-align: center; line-height: 1.3; white-space: nowrap;
            pointer-events: none; z-index: 10;
            transition: opacity 0.2s;
        }
        .gameover-message small { font-size: 28px; display: block; color: #ffe69b; }

        /* 移动端适配：保持50px直径，字体稍微缩小以保证完全居中（可选） */
        @media (max-width: 700px) {
            .virtual-btn {
                width: 50px;
                height: 50px;
                font-size: 26px;    /* 稍小一点避免溢出 */
            }
            .virtual-btn.pause { font-size: 28px; }
            .virtual-pad { gap: 15px; }
        }
        /* 对于极小屏，仍保持50px，但可调整外边距 */
        @media (max-width: 450px) {
            .virtual-pad { gap: 12px; }  /* 稍微缩小间距防止拥挤 */
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <!-- 顶部统计 & 难度 -->
    <div class="stats-bar">
        <div class="score-box">
            🍡 <span id="scoreDisplay">0</span>
        </div>
        <div class="high-box">
            <span>🏆 <span id="highScoreDisplay">0</span></span>
            <div class="history-box">
                📜
                <div class="history-icons" id="historyIcons"></div>
            </div>
        </div>
        <div class="difficulty-panel" id="difficultyPanel">
            <button class="difficulty-btn" data-diff="easy">初级</button>
            <button class="difficulty-btn active" data-diff="medium">中级</button>
            <button class="difficulty-btn" data-diff="hard">高级</button>
        </div>
    </div>

    <!-- canvas 容器 -->
    <div class="canvas-container" id="canvasContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="gameoverOverlay" class="gameover-message" style="opacity:0; visibility:hidden;">
            🌈 游戏结束 <small id="finalScoreSpan">0</small>
        </div>
    </div>

    <!-- 控制按钮组 (开始/重置) -->
    <div class="control-panel">
        <div></div>
        <div class="button-group">
            <button class="mushroom-btn" id="startBtn">
                <div class="mushroom-cap"><div class="mushroom-spot spot1"></div><div class="mushroom-spot spot2"></div></div>
                <div class="mushroom-stem"></div><span class="btn-label">开始游戏</span>
            </button>
            <button class="mushroom-btn reset" id="restartBtn">
                <div class="mushroom-cap blue"><div class="mushroom-spot spot1"></div><div class="mushroom-spot spot2"></div><div class="mushroom-spot spot3"></div></div>
                <div class="mushroom-stem"></div><span class="btn-label">重新开始</span>
            </button>
        </div>
    </div>

    <!-- 十字形虚拟按键 + 中间暂停按钮 (精致样式) -->
    <div class="virtual-pad" id="virtualPad">
        <div class="virtual-btn up" data-dir="UP">↑</div>
        <div class="virtual-btn left" data-dir="LEFT">←</div>
        <div class="virtual-btn right" data-dir="RIGHT">→</div>
        <div class="virtual-btn down" data-dir="DOWN">↓</div>
        <div class="virtual-btn pause" id="pauseBtn">⏸</div>
    </div>
</div>

<script>
    (function() {
        // ---------- 配置 ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreDisplay');
        const highScoreSpan = document.getElementById('highScoreDisplay');
        const gameoverDiv = document.getElementById('gameoverOverlay');
        const finalScoreSpan = document.getElementById('finalScoreSpan');
        const historyIconsDiv = document.getElementById('historyIcons');

        const COLS = 16, ROWS = 12, CELL_SIZE = 45;
        const GRID_WIDTH = COLS * CELL_SIZE, GRID_HEIGHT = ROWS * CELL_SIZE;
        const OFFSET_X = (canvas.width - GRID_WIDTH) / 2, OFFSET_Y = 50;

        // 游戏状态
        let snake = [];
        let food = { x: 12, y: 2 };
        let direction = 'RIGHT', nextDirection = 'RIGHT';
        let score = 0;
        let gameState = 'idle';   // 'idle', 'playing', 'gameover'
        let gameInterval = null;
        let animationFrame = null;

        // 暂停状态
        let isPaused = false;

        // 难度
        let currentDifficulty = 'medium';
        const speedMap = { easy: 200, medium: 150, hard: 100 };
        const foodCooldownMap = { easy: 0, medium: 1, hard: 2 };
        let foodCooldown = 0;

        // 本地存储数据
        let highScore = 0;
        let historyScores = [];

        // ---------- 本地存储操作 ----------
        function loadStorage() {
            try {
                const savedHigh = localStorage.getItem('snakeHighScore_v6');
                highScore = savedHigh ? parseInt(savedHigh) : 0;
                const savedHistory = localStorage.getItem('snakeHistory_v6');
                historyScores = savedHistory ? JSON.parse(savedHistory) : [];
                if (!Array.isArray(historyScores)) historyScores = [];
                if (historyScores.length > 5) historyScores = historyScores.slice(0,5);
            } catch (e) { 
                highScore = 0; historyScores = []; 
            }
            updateHighScoreDisplay();
            updateHistoryIcons();
        }
        function saveHighScore() {
            localStorage.setItem('snakeHighScore_v6', highScore);
        }
        function saveHistory() {
            localStorage.setItem('snakeHistory_v6', JSON.stringify(historyScores.slice(0,5)));
        }

        function updateHighScoreDisplay() {
            highScoreSpan.innerText = highScore;
        }

        function updateHistoryIcons() {
            historyIconsDiv.innerHTML = '';
            const list = historyScores.slice(0,5);
            for (let i = 0; i < 5; i++) {
                const icon = document.createElement('div');
                icon.className = 'history-icon';
                if (i < list.length) {
                    icon.innerText = list[i];
                } else {
                    icon.innerText = '☆';
                    icon.style.opacity = '0.5';
                }
                historyIconsDiv.appendChild(icon);
            }
        }

        function addHistory(scr) {
            historyScores.unshift(scr);
            if (historyScores.length > 5) historyScores.pop();
            saveHistory();
            updateHistoryIcons();
        }

        // ---------- 辅助函数 ----------
        function oppositeDir(dir) {
            return { 'UP':'DOWN', 'DOWN':'UP', 'LEFT':'RIGHT', 'RIGHT':'LEFT' }[dir];
        }

        function initSnake() {
            snake = [[8,8], [7,8], [6,8]];
        }

        function generateRandomFood() {
            const maxAttempts = 500;
            for (let attempt = 0; attempt < maxAttempts; attempt++) {
                const fx = Math.floor(Math.random() * COLS);
                const fy = Math.floor(Math.random() * ROWS);
                if (!snake.some(seg => seg[0] === fx && seg[1] === fy)) {
                    food = { x: fx, y: fy };
                    return true;
            }}
            return false;
        }

        function getFoodCooldownByDifficulty() {
            return foodCooldownMap[currentDifficulty] || 0;
        }

        // 重置游戏
        function resetGame() {
            if (gameInterval) clearInterval(gameInterval);
            gameInterval = null;
            gameState = 'idle';
            isPaused = false;           // 退出暂停
            direction = 'RIGHT';
            nextDirection = 'RIGHT';
            score = 0;
            updateScore();
            initSnake();
            food = { x: 12, y: 2 };
            if (snake.some(s => s[0]===food.x && s[1]===food.y)) {
                generateRandomFood();
            }
            foodCooldown = 0;
            gameoverDiv.style.opacity = '0';
            gameoverDiv.style.visibility = 'hidden';
            drawScene();
        }

        // 开始游戏
        function startGame() {
            if (gameState === 'playing') return;
            if (gameState === 'gameover') {
                resetGame();
            }
            gameState = 'playing';
            isPaused = false;            // 开始游戏时确保未暂停
            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(gameTick, speedMap[currentDifficulty]);
            drawScene();                 // 清除可能的暂停提示
        }

        // 暂停/继续切换
        function togglePause() {
            if (gameState !== 'playing') return;  // 只有游戏中才能暂停
            isPaused = !isPaused;
            if (isPaused) {
                // 暂停：清除计时器
                if (gameInterval) {
                    clearInterval(gameInterval);
                    gameInterval = null;
                }
            } else {
                // 继续：重新设置计时器
                if (gameInterval) clearInterval(gameInterval);
                gameInterval = setInterval(gameTick, speedMap[currentDifficulty]);
            }
            drawScene();  // 更新画面显示暂停提示或移除
        }

        function gameOver() {
            if (gameState !== 'playing') return;
            gameState = 'gameover';
            isPaused = false;              // 游戏结束自然退出暂停
            if (gameInterval) {
                clearInterval(gameInterval);
                gameInterval = null;
            }
            if (score > highScore) {
                highScore = score;
                saveHighScore();
                updateHighScoreDisplay();
            }
            addHistory(score);
            finalScoreSpan.innerText = score;
            gameoverDiv.style.opacity = '1';
            gameoverDiv.style.visibility = 'visible';
            drawScene();
        }

        function updateScore() {
            scoreSpan.innerText = score;
        }

        // 游戏主循环
        function gameTick() {
            // 如果暂停或非playing，不应进入这里（但保险）
            if (gameState !== 'playing' || isPaused) return;

            direction = nextDirection;

            const head = snake[0];
            let newHeadX = head[0], newHeadY = head[1];
            switch (direction) {
                case 'RIGHT': newHeadX++; break;
                case 'LEFT': newHeadX--; break;
                case 'UP': newHeadY--; break;
                case 'DOWN': newHeadY++; break;
            }

            // 撞墙
            if (newHeadX < 0 || newHeadX >= COLS || newHeadY < 0 || newHeadY >= ROWS) {
                gameOver();
                return;
            }

            const ateFood = (food && newHeadX === food.x && newHeadY === food.y);
            let newSnake = [[newHeadX, newHeadY], ...snake];
            if (!ateFood) {
                newSnake.pop();
            }

            // 自身碰撞
            const headPos = newSnake[0];
            if (newSnake.slice(1).some(seg => seg[0]===headPos[0] && seg[1]===headPos[1])) {
                gameOver();
                return;
            }

            snake = newSnake;

            if (ateFood) {
                score++;
                updateScore();
                food = null;
                foodCooldown = getFoodCooldownByDifficulty();
            }

            if (!food) {
                if (foodCooldown <= 0) {
                    if (!generateRandomFood()) {
                        gameOver();
                        return;
                    }
                } else {
                    foodCooldown--;
                }
            }

            drawScene();
        }

        // ---------- 梦幻绘画 (亮绿色食物) ----------
        function drawScene() {
            if (animationFrame) cancelAnimationFrame(animationFrame);
            animationFrame = requestAnimationFrame(() => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // 天空渐变
                const skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
                skyGrad.addColorStop(0, '#f4c6f0');
                skyGrad.addColorStop(0.7, '#fbd5e8');
                ctx.fillStyle = skyGrad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // 彩虹
                ctx.save();
                ctx.globalAlpha = 0.3;
                for (let i=0; i<3; i++) {
                    ctx.beginPath();
                    ctx.arc(650, 120, 100 + i*25, 0, Math.PI, true);
                    ctx.strokeStyle = `hsl(${30 + i*20}, 80%, 80%)`;
                    ctx.lineWidth = 15 - i*3;
                    ctx.stroke();
                }
                ctx.restore();

                // 云朵
                ctx.shadowColor = '#ffffffd0';
                ctx.shadowBlur = 30;
                ctx.fillStyle = '#ffffffb0';
                drawCloud(150, 80, 50);
                drawCloud(500, 40, 70);
                drawCloud(300, 130, 40);
                ctx.shadowColor = 'transparent';
                ctx.shadowBlur = 0;

                // 六边形网格
                for (let row=0; row<ROWS; row++) {
                    for (let col=0; col<COLS; col++) {
                        const cx = OFFSET_X + col*CELL_SIZE + CELL_SIZE/2;
                        const cy = OFFSET_Y + row*CELL_SIZE + CELL_SIZE/2;
                        drawHexagon(cx, cy, CELL_SIZE*0.4);
                    }
                }

                // 绘制食物 (亮绿色星星 + 强发光)
                if (food) {
                    drawStar(food.x, food.y);
                    drawSparkles(food.x, food.y);
                    drawExtraGlow(food.x, food.y);
                }

                // 绘制蛇
                for (let i=0; i<snake.length; i++) {
                    const [col, row] = snake[i];
                    drawSnakeSegment(col, row, i===0, i);
                }

                // 如果处于暂停状态，绘制暂停提示
                if (gameState === 'playing' && isPaused) {
                    ctx.save();
                    ctx.shadowBlur = 30;
                    ctx.shadowColor = '#00000080';
                    // 半透明圆角矩形
                    ctx.fillStyle = 'rgba(30, 20, 30, 0.85)';
                    ctx.beginPath();
                    ctx.roundRect(canvas.width/2 - 130, canvas.height/2 - 50, 260, 100, 50);
                    ctx.fill();
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 44px "Quicksand", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('⏸ 暂停', canvas.width/2, canvas.height/2);
                    ctx.restore();
                }
            });
        }

        // 定义 roundRect 方法
        CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            this.moveTo(x + r, y);
            this.lineTo(x + w - r, y);
            this.quadraticCurveTo(x + w, y, x + w, y + r);
            this.lineTo(x + w, y + h - r);
            this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            this.lineTo(x + r, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - r);
            this.lineTo(x, y + r);
            this.quadraticCurveTo(x, y, x + r, y);
            return this;
        };

        // 云朵
        function drawCloud(x,y,s) {
            ctx.beginPath();
            ctx.arc(x,y,s*0.6,0,2*Math.PI);
            ctx.arc(x+s*0.5,y-s*0.2,s*0.5,0,2*Math.PI);
            ctx.arc(x-s*0.4,y-s*0.3,s*0.55,0,2*Math.PI);
            ctx.arc(x+s*0.2,y+s*0.2,s*0.45,0,2*Math.PI);
            ctx.fill();
        }

        function drawHexagon(cx,cy,r) {
            ctx.save();
            ctx.shadowColor = '#ffeaf0';
            ctx.shadowBlur = 20;
            ctx.shadowOffsetY = 4;
            ctx.beginPath();
            for (let i=0; i<6; i++) {
                let angle = Math.PI/6 + i*Math.PI/3;
                let x = cx + r*Math.cos(angle);
                let y = cy + r*Math.sin(angle);
                if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
            }
            ctx.closePath();
            ctx.fillStyle = '#fffbf0d0';
            ctx.fill();
            ctx.shadowBlur = 12;
            ctx.strokeStyle = '#f8e2b0';
            ctx.lineWidth = 2.5;
            ctx.stroke();
            ctx.restore();
        }

        function drawSnakeSegment(col,row,isHead,idx) {
            const cx = OFFSET_X + col*CELL_SIZE + CELL_SIZE/2;
            const cy = OFFSET_Y + row*CELL_SIZE + CELL_SIZE/2;
            const r = CELL_SIZE*0.38;
            ctx.save();
            ctx.shadowColor = '#ffc8f0';
            ctx.shadowBlur = 28;
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 4;
            const hue = (idx*15 + Date.now()*0.01) % 360;
            const grad = ctx.createRadialGradient(cx-5,cy-5,5,cx,cy,r*1.5);
            grad.addColorStop(0, `hsla(${hue},85%,75%,0.9)`);
            grad.addColorStop(0.5, `hsla(${hue+40},80%,70%,0.7)`);
            grad.addColorStop(1, `hsla(${hue+80},90%,65%,0.5)`);
            ctx.beginPath();
            ctx.arc(cx,cy,r,0,2*Math.PI);
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.shadowBlur = 12;
            ctx.beginPath();
            ctx.arc(cx-6,cy-6,r*0.25,0,2*Math.PI);
            ctx.fillStyle = '#ffffffd0';
            ctx.fill();
            if (isHead) {
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.arc(cx-7,cy-7,4,0,2*Math.PI);
                ctx.fillStyle = '#3f1e2e';
                ctx.fill();
                ctx.beginPath();
                ctx.arc(cx-9,cy-9,1.5,0,2*Math.PI);
                ctx.fillStyle = 'white';
                ctx.fill();
                ctx.beginPath();
                ctx.strokeStyle = '#4f2d3a';
                ctx.lineWidth = 2;
                ctx.arc(cx+2,cy+2,8,0.1,Math.PI-0.1);
                ctx.stroke();
            }
            for (let s=0;s<3;s++) {
                ctx.beginPath();
                ctx.arc(cx-3+s*4, cy-2+s*2, 1.8, 0, 2*Math.PI);
                ctx.fillStyle = `rgba(255,255,240,${0.5+Math.sin(Date.now()*0.01+s)*0.3})`;
                ctx.fill();
            }
            ctx.restore();
        }

        // 亮绿色星星
        function drawStar(col,row) {
            const cx = OFFSET_X + col*CELL_SIZE + CELL_SIZE/2;
            const cy = OFFSET_Y + row*CELL_SIZE + CELL_SIZE/2;
            const outerR = CELL_SIZE*0.35;
            const innerR = outerR*0.4;
            ctx.save();
            ctx.shadowColor = '#00FFAA';
            ctx.shadowBlur = 60;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;
            ctx.beginPath();
            for (let i=0;i<5;i++) {
                let angle = (i*72 - 36)*Math.PI/180;
                let xOut = cx + outerR*Math.cos(angle);
                let yOut = cy + outerR*Math.sin(angle);
                if (i===0) ctx.moveTo(xOut,yOut); else ctx.lineTo(xOut,yOut);
                let angleI = ((i+1)*72)*Math.PI/180;
                let xIn = cx + innerR*Math.cos(angleI);
                let yIn = cy + innerR*Math.sin(angleI);
                ctx.lineTo(xIn,yIn);
            }
            ctx.closePath();
            // 高饱和亮绿渐变
            const grad = ctx.createRadialGradient(cx,cy,2,cx,cy,outerR*2);
            grad.addColorStop(0, '#CCFF88');
            grad.addColorStop(0.4, '#88FF44');
            grad.addColorStop(1, '#00CC66');
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.restore();
        }

        // 发光粒子 (绿色调)
        function drawSparkles(col,row) {
            const cx = OFFSET_X + col*CELL_SIZE + CELL_SIZE/2;
            const cy = OFFSET_Y + row*CELL_SIZE + CELL_SIZE/2;
            ctx.save();
            ctx.shadowBlur = 30;
            ctx.shadowColor = '#88FF88';
            for (let i=0;i<12;i++) {
                let angle = Date.now()/180 + i*1.2;
                let dist = 24 + Math.sin(Date.now()/120 + i)*6;
                let x = cx + Math.cos(angle)*dist;
                let y = cy + Math.sin(angle)*dist;
                ctx.beginPath();
                ctx.arc(x,y,3.5+Math.sin(angle+i)*1.5,0,2*Math.PI);
                ctx.fillStyle = `rgba(170, 255, 150, 0.9)`;
                ctx.fill();
            }
            ctx.restore();
        }

        // 额外辉光 (绿色光环)
        function drawExtraGlow(col,row) {
            const cx = OFFSET_X + col*CELL_SIZE + CELL_SIZE/2;
            const cy = OFFSET_Y + row*CELL_SIZE + CELL_SIZE/2;
            ctx.save();
            ctx.shadowBlur = 70;
            ctx.shadowColor = '#22FF88';
            for (let i=0;i<5;i++) {
                ctx.beginPath();
                ctx.arc(cx,cy,16+i*6,0,2*Math.PI);
                ctx.fillStyle = `rgba(50,255,100,${0.1 - i*0.015})`;
                ctx.fill();
            }
            ctx.restore();
        }

        // ---------- 事件绑定 ----------
        function handleDirection(dir) {
            if (gameState !== 'playing' || isPaused) return;  // 暂停时方向无效
            if (oppositeDir(dir) !== direction) {
                nextDirection = dir;
            }
        }

        // 键盘事件
        window.addEventListener('keydown', (e) => {
            const key = e.key;
            if (key.startsWith('Arrow')) e.preventDefault();
            if (gameState !== 'playing' || isPaused) return;  // 暂停时方向无效
            let newDir = null;
            if (key === 'ArrowUp') newDir = 'UP';
            else if (key === 'ArrowDown') newDir = 'DOWN';
            else if (key === 'ArrowLeft') newDir = 'LEFT';
            else if (key === 'ArrowRight') newDir = 'RIGHT';
            else return;
            if (oppositeDir(newDir) !== direction) {
                nextDirection = newDir;
            }
        });

        // 虚拟方向按键
        const virtualBtns = document.querySelectorAll('.virtual-btn[data-dir]');
        virtualBtns.forEach(btn => {
            const dir = btn.dataset.dir;
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleDirection(dir);
            }, { passive: false });
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                handleDirection(dir);
            });
        });

        // 暂停按钮
        document.getElementById('pauseBtn').addEventListener('click', (e) => {
            e.preventDefault();
            togglePause();
        });
        document.getElementById('pauseBtn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            togglePause();
        }, { passive: false });

        // 开始/重置按钮
        document.getElementById('startBtn').addEventListener('click', () => {
            if (gameState === 'idle') startGame();
            else if (gameState === 'gameover') { resetGame(); startGame(); }
        });
        document.getElementById('restartBtn').addEventListener('click', () => {
            resetGame();
        });

        // 难度切换
        document.querySelectorAll('.difficulty-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentDifficulty = btn.dataset.diff;
                // 如果正在游戏且未暂停，重新设定速度
                if (gameState === 'playing' && !isPaused) {
                    if (gameInterval) clearInterval(gameInterval);
                    gameInterval = setInterval(gameTick, speedMap[currentDifficulty]);
                }
            });
        });

        // 全局禁止方向键滚动
        window.addEventListener('keydown', (e) => {
            if (e.key.startsWith('Arrow')) e.preventDefault();
        }, { passive: false });

        // 加载本地存储并初始化
        loadStorage();
        resetGame();
    })();
</script>
</body>
</html>
