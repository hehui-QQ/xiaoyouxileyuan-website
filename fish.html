<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>摸鱼大师 · 音效版</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Segoe UI', 'Comic Neue', sans-serif;
        }
        body {
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(145deg, #b8e1ff, #d4f0fd);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        .game-container {
            width: 1000px;
            max-width: 100%;
            background: #ffffffcc;
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 20px 20px 25px;
            box-shadow: 0 20px 30px rgba(0,30,50,0.2);
            border: 3px solid white;
            position: relative;
        }
        .canvas-wrapper {
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 8px 0 #7aa5c0, 0 15px 25px rgba(0,0,0,0.1);
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: #eaf6ff;
            cursor: pointer;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 0 10px;
            padding: 0 5px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .stats {
            background: #ffe9c7;
            padding: 6px 18px;
            border-radius: 40px;
            box-shadow: inset 0 -3px 0 #cfb087, 0 5px 0 #8b6d4c;
            display: flex;
            gap: 15px;
            font-weight: 700;
            font-size: 1.2rem;
            color: #2d4a5e;
        }
        .stats span {
            background: white;
            padding: 4px 14px;
            border-radius: 30px;
            box-shadow: inset 0 1px 4px #aaa;
        }
        .buttons {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: flex-end;
            align-items: center;
        }
        .btn {
            background: #ffcf96;
            border: none;
            font-size: 1.1rem;
            font-weight: bold;
            padding: 6px 16px;
            border-radius: 40px;
            box-shadow: 0 5px 0 #b27d40, 0 6px 12px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: 0.06s;
            border: 2px solid #fff9e6;
            white-space: nowrap;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #b27d40;
        }
        .btn.level {
            background: #b7d9f0;
            box-shadow: 0 5px 0 #638aa8;
            cursor: default;
            opacity: 0.9;
        }
        .btn.level.current-level {
            background: #3f7fb0;
            box-shadow: 0 5px 0 #1f4f70;
            color: white;
            border-color: #ffecaa;
            transform: scale(1.02);
        }
        .btn:disabled {
            opacity: 0.5;
            transform: translateY(0);
            box-shadow: 0 5px 0 #b27d40;
            cursor: not-allowed;
        }
        #startBtn {
            background: #6fcf97;
            box-shadow: 0 5px 0 #2e7d5e;
            color: #1d4e2b;
        }
        #roleSelectBtn {
            background: #d4a5f0;
            box-shadow: 0 5px 0 #8a6bb0;
            color: #3a2255;
        }
        .sound-btn {
            background: #e0e0e0;
            box-shadow: 0 5px 0 #a0a0a0;
            color: #2d2d2d;
            font-size: 1.2rem;
            padding: 6px 12px;
            min-width: 50px;
        }
        .sound-btn.muted {
            opacity: 0.5;
            background: #ccc;
        }
        .rule-bar {
            background: #fff0d4;
            border-radius: 40px;
            padding: 8px 15px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            border: 3px solid #ffb347;
            margin-top: 5px;
            gap: 8px;
        }
        .rule-item {
            display: flex;
            align-items: center;
            gap: 4px;
            background: white;
            padding: 4px 14px;
            border-radius: 30px;
            font-weight: 600;
            color: #1f4a6e;
            font-size: 0.95rem;
        }
        .goal-badge {
            background: #b1d9b9;
            padding: 6px 22px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1.2rem;
            color: #1d4e2b;
            box-shadow: inset 0 -3px 0 #6e9e7a, 0 5px 0 #367a46;
            white-space: nowrap;
        }
        .footer {
            margin-top: 10px;
            text-align: center;
            color: #2d5a7a;
            font-weight: 600;
            background: #fffbe0;
            padding: 6px 15px;
            border-radius: 40px;
            border: 2px dashed #ff914d;
            font-size: 0.95rem;
            display: block;
        }
        kbd {
            background: #2d2d2d;
            color: white;
            padding: 4px 8px;
            border-radius: 20px;
            margin: 0 4px;
        }

        /* 角色选择弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: #fff5e6;
            border-radius: 60px;
            padding: 30px 20px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 20px 0 #b27d40, 0 30px 30px rgba(0,0,0,0.3);
            border: 4px solid white;
            text-align: center;
        }
        .modal-content h2 {
            font-size: 2.2rem;
            color: #3f2e1b;
            margin: 0 0 15px;
            text-shadow: 2px 2px 0 #ffcf96;
        }
        .role-options {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .role-card {
            background: #e8d2ff;
            border-radius: 40px;
            padding: 20px 15px;
            width: 200px;
            cursor: pointer;
            border: 4px solid white;
            box-shadow: 0 8px 0 #aa8fc0, 0 10px 20px rgba(0,0,0,0.1);
            transition: 0.1s;
        }
        .role-card.selected {
            background: #ffd966;
            box-shadow: 0 8px 0 #b27d40;
            transform: scale(1.02);
        }
        .role-card:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #aa8fc0;
        }
        .role-avatar {
            font-size: 4.5rem;
            line-height: 1.2;
            filter: drop-shadow(4px 6px 0 rgba(0,0,0,0.2));
        }
        .role-name {
            font-size: 1.6rem;
            font-weight: bold;
            color: #2d1b0f;
            margin: 8px 0;
        }
        .role-warning {
            font-size: 1.2rem;
            color: #c0392b;
            margin-top: 5px;
        }
        .modal-buttons {
            margin-top: 25px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .modal-btn {
            background: #ffcf96;
            border: none;
            font-size: 1.3rem;
            font-weight: bold;
            padding: 10px 25px;
            border-radius: 40px;
            box-shadow: 0 6px 0 #b27d40;
            cursor: pointer;
            border: 2px solid white;
        }
        .modal-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #b27d40;
        }

        /* 手机端适配 */
        @media (max-width: 700px) {
            .stats {
                font-size: 1rem;
                padding: 4px 12px;
                gap: 8px;
            }
            .stats span {
                padding: 3px 10px;
            }
            .btn {
                font-size: 1rem;
                padding: 5px 12px;
            }
            .sound-btn {
                font-size: 1rem;
                padding: 5px 8px;
                min-width: 40px;
            }
            .rule-item {
                font-size: 0.85rem;
                padding: 3px 10px;
            }
            .goal-badge {
                font-size: 1rem;
                padding: 4px 16px;
            }
            .footer {
                font-size: 0.85rem;
                padding: 5px 10px;
            }
            .modal-content h2 {
                font-size: 1.8rem;
            }
            .role-card {
                width: 160px;
                padding: 15px 10px;
            }
            .role-avatar {
                font-size: 3.5rem;
            }
            .role-name {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="canvas-wrapper">
        <canvas id="gameCanvas" width="1000" height="550"></canvas>
    </div>

    <!-- 三行布局 -->
    <div class="status-bar">
        <div class="stats">
            <div>⏱️ <span id="timerDisplay">60秒</span></div>
            <div>🐟 <span id="fishSecondsDisplay">0s</span></div>
            <div>⚡ <span id="comboDisplay">1.0x</span></div>
        </div>
        <div class="buttons">
            <button class="btn level" id="level1Btn">1关</button>
            <button class="btn level" id="level2Btn">2关</button>
            <button class="btn level" id="level3Btn">3关</button>
            <button class="btn" id="roleSelectBtn">👤 角色</button>
            <button class="btn" id="startBtn">开始第1关</button>
            <button class="btn" id="resetBtn">重来</button>
            <button class="btn sound-btn" id="soundToggleBtn">🔊</button>
        </div>
    </div>

    <div class="rule-bar">
        <div class="rule-item">🐟 长按 = 摸鱼 +1/s</div>
        <div class="rule-item">👀 监控红闪 = 立刻松手</div>
        <div class="rule-item">😭 被抓 = 扣20%</div>
        <div class="goal-badge" id="goalDisplay">🎯 40秒</div>
    </div>

    <div class="footer">
        <kbd>长按鼠标/空格</kbd> · 连续摸鱼触发倍数 · 达标立即通关
    </div>
</div>

<!-- 角色选择弹窗 -->
<div class="modal" id="roleModal">
    <div class="modal-content">
        <h2>✨ 选择你的身份 ✨</h2>
        <div class="role-options">
            <div class="role-card" data-role="worker" id="roleWorker">
                <div class="role-avatar">🪢👔</div>
                <div class="role-name">摸鱼上班族</div>
                <div class="role-warning">老板来了！</div>
            </div>
            <div class="role-card" data-role="student" id="roleStudent">
                <div class="role-avatar">👓🌸</div>
                <div class="role-name">摸鱼学生党</div>
                <div class="role-warning">老师来了！</div>
            </div>
        </div>
        <div class="modal-buttons">
            <button class="modal-btn" id="confirmRoleBtn">确认选择</button>
            <button class="modal-btn" id="closeModalBtn">取消</button>
        </div>
    </div>
</div>

<script>
(function() {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const timerSpan = document.getElementById('timerDisplay');
    const fishSecondsSpan = document.getElementById('fishSecondsDisplay');
    const comboSpan = document.getElementById('comboDisplay');
    const goalSpan = document.getElementById('goalDisplay');

    // 角色选择相关
    const roleModal = document.getElementById('roleModal');
    const roleSelectBtn = document.getElementById('roleSelectBtn');
    const roleWorker = document.getElementById('roleWorker');
    const roleStudent = document.getElementById('roleStudent');
    const confirmRoleBtn = document.getElementById('confirmRoleBtn');
    const closeModalBtn = document.getElementById('closeModalBtn');
    let selectedRole = 'worker';

    function updateRoleCardSelection() {
        if (selectedRole === 'worker') {
            roleWorker.classList.add('selected');
            roleStudent.classList.remove('selected');
        } else {
            roleStudent.classList.add('selected');
            roleWorker.classList.remove('selected');
        }
    }
    roleWorker.addEventListener('click', () => { selectedRole = 'worker'; updateRoleCardSelection(); });
    roleStudent.addEventListener('click', () => { selectedRole = 'student'; updateRoleCardSelection(); });
    roleSelectBtn.addEventListener('click', () => {
        roleModal.classList.add('active');
        updateRoleCardSelection();
    });
    closeModalBtn.addEventListener('click', () => {
        roleModal.classList.remove('active');
    });
    confirmRoleBtn.addEventListener('click', () => {
        resetGame(1);
        roleModal.classList.remove('active');
        playBeep('score', 80);
    });

    // 关卡配置
    const levelGoals = [40, 45, 50];
    const bossIntervals = [
        [15000, 20000],
        [10000, 15000],
        [5000, 10000]
    ];
    const punishPercent = [0.2, 0.2, 0.2];
    const flashCounts = [2, 1, 1];
    const comboRules = [
        { threshold: 15, factor: 1.5 },
        { threshold: 10, factor: 2.0 },
        { threshold: 7,  factor: 3.0 }
    ];

    // 按钮
    const level1Btn = document.getElementById('level1Btn');
    const level2Btn = document.getElementById('level2Btn');
    const level3Btn = document.getElementById('level3Btn');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    const soundToggleBtn = document.getElementById('soundToggleBtn');

    let currentLevel = 1;

    function updateLevelButtons(level) {
        [level1Btn, level2Btn, level3Btn].forEach(btn => btn.classList.remove('current-level'));
        if (level === 1) level1Btn.classList.add('current-level');
        else if (level === 2) level2Btn.classList.add('current-level');
        else if (level === 3) level3Btn.classList.add('current-level');
        goalSpan.innerText = `🎯 ${levelGoals[level-1]}秒`;
        if (!gameState.playing && !gameState.gameOver) {
            startBtn.innerText = `开始第${level}关`;
        }
    }

    let gameState = {
        level: currentLevel,
        fishSeconds: 0,
        timeLeft: 60,
        playing: false,
        gameOver: false,
        levelCompleted: false,
        fishActive: false,
        comboFactor: 1.0,
        continuousFishTime: 0,
        punishTimer: 0,
        totalFishTime: 0,
        caughtCount: 0,
        lastComboLevel: false,
    };

    let bossSystem = {
        active: false,
        visible: false,
        flickerInterval: null,
        appearTimer: null,
        nextBossTimer: null,
        bossDuration: 500,
        caughtFlag: false,
        flickerVisible: false,
    };

    let floatingMessage = {
        text: '',
        alpha: 0,
        x: 0,
        y: 0,
        size: 32,
    };

    let bossFloatingMessage = {
        text: '',
        alpha: 0,
        x: 400,
        y: 120,
        size: 48,
        timer: 0,
    };

    // 【核心修复】手机显示状态 - 仅在长按摸鱼中为true
    let isPhoneShow = false;

    // 音频系统 =================================================
    let audioCtx = null;
    let musicGain = null;
    let soundGain = null;
    let soundOverall = true;   // 总声音开关
    const defaultVolume = 0.4;  // 40%

    // 从localStorage读取设置
    try {
        const savedSound = localStorage.getItem('mooyu_sound');
        if (savedSound !== null) soundOverall = savedSound === '1';
    } catch (e) {}

    // 更新按钮状态
    function updateSoundButton() {
        soundToggleBtn.classList.toggle('muted', !soundOverall);
        soundToggleBtn.innerText = soundOverall ? '🔊' : '🔇';
    }
    soundToggleBtn.addEventListener('click', () => {
        soundOverall = !soundOverall;
        try { localStorage.setItem('mooyu_sound', soundOverall ? '1' : '0'); } catch (e) {}
        updateSoundButton();
        if (soundOverall) {
            startBackgroundMusic();
        } else {
            stopBackgroundMusic();
        }
    });
    updateSoundButton();

    // 初始化音频上下文（需用户手势启动）
    function initAudio() {
        if (audioCtx) return;
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            musicGain = audioCtx.createGain();
            soundGain = audioCtx.createGain();
            // 音量由 soundOverall 和默认音量共同决定
            musicGain.gain.value = soundOverall ? defaultVolume : 0;
            soundGain.gain.value = soundOverall ? defaultVolume : 0;
            musicGain.connect(audioCtx.destination);
            soundGain.connect(audioCtx.destination);
        } catch (e) {
            console.warn('Web Audio not supported');
        }
    }

    // 背景音乐（简单电子乐循环）
    let bgmInterval = null;
    let bgmNotes = [440, 523, 659, 784]; // A4, C5, E5, G5
    let bgmIndex = 0;
    function playBackgroundMusicNote() {
        if (!audioCtx || audioCtx.state !== 'running' || !soundOverall || !musicGain) return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth'; // 电子音色
        osc.frequency.value = bgmNotes[bgmIndex % bgmNotes.length];
        bgmIndex++;
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
        osc.connect(gain);
        gain.connect(musicGain);
        osc.start(now);
        osc.stop(now + 0.3);
        osc.onended = () => osc.disconnect();
    }
    function startBackgroundMusic() {
        if (!soundOverall) return;
        if (bgmInterval) clearInterval(bgmInterval);
        // 每0.4秒一个音符，形成连续节奏
        bgmInterval = setInterval(() => {
            if (!soundOverall || !audioCtx || audioCtx.state !== 'running') return;
            playBackgroundMusicNote();
        }, 400);
    }
    function stopBackgroundMusic() {
        if (bgmInterval) {
            clearInterval(bgmInterval);
            bgmInterval = null;
        }
    }

    // 人声提示（模拟Q版人声）
    function playVoice(role) {
        if (!soundOverall || !audioCtx || audioCtx.state !== 'running' || !soundGain) return;
        const now = audioCtx.currentTime;
        // 老板来了：低-高-低 三个音快速变化
        // 老师来了：高-低-高 变化
        const freqPattern = (role === 'student') ? [660, 440, 550] : [440, 660, 550];
        for (let i = 0; i < 3; i++) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square'; // 方波更有趣
            osc.frequency.value = freqPattern[i];
            gain.gain.setValueAtTime(0.15, now + i*0.1);
            gain.gain.exponentialRampToValueAtTime(0.001, now + i*0.1 + 0.1);
            osc.connect(gain);
            gain.connect(soundGain);
            osc.start(now + i*0.1);
            osc.stop(now + i*0.1 + 0.1);
            osc.onended = () => osc.disconnect();
        }
    }

    // 原有音效函数
    function playBeep(type, duration=150) {
        if (!soundOverall || !audioCtx || audioCtx.state !== 'running' || !soundGain) return;
        let freq = { warning:880, caught:320, score:1200, goal:1500, fail:200 }[type] || 600;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(soundGain);
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration/1000);
        osc.start(); osc.stop(audioCtx.currentTime + duration/1000);
        osc.onended = () => osc.disconnect();
    }

    // 激活音频（用户手势）
    function activateAudio() {
        if (!audioCtx) initAudio();
        if (audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume().then(() => {
                // 恢复后检查音乐是否应该播放
                if (soundOverall && !bgmInterval) startBackgroundMusic();
            });
        } else if (audioCtx && audioCtx.state === 'running') {
            if (soundOverall && !bgmInterval) startBackgroundMusic();
        }
    }

    // 绑定音频激活到用户操作
    function bindAudioActivation() {
        const events = ['mousedown', 'keydown', 'touchstart'];
        const handler = () => {
            activateAudio();
            events.forEach(ev => document.removeEventListener(ev, handler));
        };
        events.forEach(ev => document.addEventListener(ev, handler));
    }
    bindAudioActivation();
    // ========================================================

    function resetGame(level) {
        if (bossSystem.flickerInterval) clearInterval(bossSystem.flickerInterval);
        if (bossSystem.appearTimer) clearTimeout(bossSystem.appearTimer);
        if (bossSystem.nextBossTimer) clearTimeout(bossSystem.nextBossTimer);
        bossSystem.active = false; bossSystem.visible = false; bossSystem.flickerVisible = false;

        currentLevel = level;
        gameState = {
            level: level,
            fishSeconds: 0,
            timeLeft: 60,
            playing: false,
            gameOver: false,
            levelCompleted: false,
            fishActive: false,
            comboFactor: 1.0,
            continuousFishTime: 0,
            punishTimer: 0,
            totalFishTime: 0,
            caughtCount: 0,
            lastComboLevel: false,
        };

        // 【核心修复】重置手机显示状态
        isPhoneShow = false;

        // 重置背景音乐状态
        stopBackgroundMusic();
        if (soundOverall) {
            startBackgroundMusic();
        }

        updateLevelButtons(level);
        startBtn.disabled = false;
        startBtn.innerText = `开始第${level}关`;
        // 重置显示状态
        timerSpan.innerText = '60秒';
        fishSecondsSpan.innerText = '0s';
        comboSpan.innerText = '1.0x';

        // 【核心修复】重置时清空整个画布并强制重绘
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#eaf6ff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        playBeep('score',100);
    }

    function startGame() {
        if (gameState.playing || gameState.gameOver) return;
        gameState.playing = true;
        gameState.gameOver = false;
        gameState.levelCompleted = false;
        scheduleNextBoss();
        startBtn.disabled = true;
        startBtn.innerText = '摸鱼中...';
    }

    function getRandomInterval(level) {
        let [min, max] = bossIntervals[level-1];
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function scheduleNextBoss() {
        if (!gameState.playing || gameState.gameOver) return;
        if (bossSystem.nextBossTimer) clearTimeout(bossSystem.nextBossTimer);
        bossSystem.nextBossTimer = setTimeout(() => startBossWarning(), getRandomInterval(gameState.level));
    }

    function startBossWarning() {
        if (!gameState.playing || gameState.gameOver) return;
        if (bossSystem.flickerInterval) clearInterval(bossSystem.flickerInterval);

        let flashCount = flashCounts[gameState.level-1];
        let flickerTimes = 0;
        bossSystem.active = false;
        bossSystem.flickerVisible = true;
        playBeep('warning', 150);

        // 播放人声提示
        playVoice(selectedRole);

        bossFloatingMessage.text = selectedRole === 'student' ? '老师来了！' : '老板来了！';
        bossFloatingMessage.alpha = 1.0;
        bossFloatingMessage.timer = 1.5;

        bossSystem.flickerInterval = setInterval(() => {
            if (!gameState.playing || gameState.gameOver) {
                clearInterval(bossSystem.flickerInterval);
                return;
            }
            bossSystem.flickerVisible = !bossSystem.flickerVisible;
            flickerTimes++;
            if (flickerTimes >= flashCount * 2) {
                clearInterval(bossSystem.flickerInterval);
                bossSystem.active = true;
                bossSystem.visible = true;
                bossSystem.caughtFlag = false;
                bossSystem.flickerVisible = false;

                bossSystem.appearTimer = setTimeout(() => {
                    bossSystem.active = false;
                    bossSystem.visible = false;
                    scheduleNextBoss();
                }, bossSystem.bossDuration);
            }
        }, 150);
    }

    function applyCaught() {
        if (gameState.punishTimer > 0) return;
        gameState.caughtCount++;
        let percent = 0.2;
        let lost = Math.floor(gameState.fishSeconds * percent);
        gameState.fishSeconds = Math.max(0, gameState.fishSeconds - lost);
        gameState.continuousFishTime = 0;
        gameState.comboFactor = 1.0;
        gameState.lastComboLevel = false;
        gameState.punishTimer = 1.0;
        gameState.fishActive = false;

        // 【核心修复】被抓时立即隐藏手机
        isPhoneShow = false;

        playBeep('caught', 350);

        floatingMessage.text = `😵 被抓！ -${lost}秒 (20%)`;
        floatingMessage.alpha = 1.0;
        floatingMessage.x = 300;
        floatingMessage.y = 250;
        floatingMessage.size = 40;
    }

    function setFishActive(active) {
        if (!gameState.playing || gameState.gameOver) return;
        if (gameState.punishTimer > 0) {
            if (!active) gameState.fishActive = false;
            // 【核心修复】惩罚期间不显示手机
            isPhoneShow = false;
            return;
        }
        if (gameState.fishActive === active) return;
        gameState.fishActive = active;

        // 【核心修复】只有摸鱼状态才显示手机
        isPhoneShow = active;

        if (active) {
            playBeep('score', 50);
        } else {
            gameState.continuousFishTime = 0;
            gameState.comboFactor = 1.0;
            gameState.lastComboLevel = false;
        }
    }

    function bindControls() {
        canvas.addEventListener('mousedown', (e) => { e.preventDefault(); setFishActive(true); });
        canvas.addEventListener('mouseup', (e) => { e.preventDefault(); setFishActive(false); });
        canvas.addEventListener('mouseleave', () => setFishActive(false));
        window.addEventListener('keydown', (e) => { if(e.code==='Space') { e.preventDefault(); setFishActive(true); } });
        window.addEventListener('keyup', (e) => { if(e.code==='Space') { e.preventDefault(); setFishActive(false); } });
    }

    let lastTimestamp = 0;

    function updateGame(now) {
        if (!lastTimestamp) { lastTimestamp = now; requestAnimationFrame(updateGame); return; }

        const deltaSec = Math.min(0.1, (now - lastTimestamp) / 1000);
        lastTimestamp = now;

        if (gameState.playing && !gameState.gameOver) {
            if (!gameState.levelCompleted && gameState.fishSeconds >= levelGoals[gameState.level-1]) {
                gameState.playing = false;
                gameState.gameOver = true;
                gameState.levelCompleted = true;
                gameState.fishActive = false;
                // 【核心修复】通关时隐藏手机
                isPhoneShow = false;
                if (bossSystem.flickerInterval) clearInterval(bossSystem.flickerInterval);
                if (bossSystem.appearTimer) clearTimeout(bossSystem.appearTimer);
                if (bossSystem.nextBossTimer) clearTimeout(bossSystem.nextBossTimer);
                bossSystem.active = false;
                playBeep('goal',400);
                if (gameState.level < 3) {
                    startBtn.disabled = false;
                    startBtn.innerText = '开始下一关';
                } else {
                    startBtn.disabled = true;
                    startBtn.innerText = '🏆 全部通关';
                }
            } else {
                gameState.timeLeft = Math.max(0, gameState.timeLeft - deltaSec);
                if (gameState.timeLeft <= 0) {
                    gameState.timeLeft = 0;
                    gameState.playing = false;
                    gameState.gameOver = true;
                    gameState.fishActive = false;
                    // 【核心修复】游戏结束隐藏手机
                    isPhoneShow = false;
                    if (bossSystem.flickerInterval) clearInterval(bossSystem.flickerInterval);
                    if (bossSystem.appearTimer) clearTimeout(bossSystem.appearTimer);
                    if (bossSystem.nextBossTimer) clearTimeout(bossSystem.nextBossTimer);
                    bossSystem.active = false;
                    gameState.levelCompleted = gameState.fishSeconds >= levelGoals[gameState.level-1];

                    if (gameState.levelCompleted) {
                        playBeep('goal',400);
                        if (gameState.level < 3) {
                            startBtn.disabled = false;
                            startBtn.innerText = '开始下一关';
                        } else {
                            startBtn.disabled = true;
                            startBtn.innerText = '🏆 全部通关';
                        }
                    } else {
                        startBtn.disabled = false;
                        startBtn.innerText = '重新挑战';
                        playBeep('fail', 300);
                    }
                }

                if (gameState.fishActive && gameState.punishTimer <= 0) {
                    gameState.continuousFishTime += deltaSec;
                    let level = gameState.level - 1;
                    let rule = comboRules[level];

                    if (!gameState.lastComboLevel && gameState.continuousFishTime >= rule.threshold) {
                        gameState.comboFactor = rule.factor;
                        gameState.lastComboLevel = true;
                        floatingMessage.text = `🎉 摸鱼达人！收益×${rule.factor}`;
                        floatingMessage.alpha = 1.0;
                        floatingMessage.x = 280;
                        floatingMessage.y = 160;
                        floatingMessage.size = 36;
                    }

                    let gain = deltaSec * gameState.comboFactor;
                    gameState.fishSeconds += gain;
                    gameState.totalFishTime += gain;

                    if (floatingMessage.alpha <= 0.2) {
                        floatingMessage.text = `+${gameState.comboFactor.toFixed(1)}/s`;
                        floatingMessage.alpha = 1.0;
                        floatingMessage.x = 280;
                        floatingMessage.y = 160;
                        floatingMessage.size = 36;
                    }
                } else {
                    if (!gameState.fishActive) {
                        gameState.continuousFishTime = 0;
                        gameState.comboFactor = 1.0;
                        gameState.lastComboLevel = false;
                    }
                }

                if (gameState.punishTimer > 0) {
                    gameState.punishTimer -= deltaSec;
                    if (gameState.punishTimer < 0) gameState.punishTimer = 0;
                }

                if (bossSystem.active && gameState.fishActive && gameState.punishTimer <= 0 && !bossSystem.caughtFlag) {
                    bossSystem.caughtFlag = true;
                    applyCaught();
                }
            }
        }

        if (floatingMessage.alpha > 0) {
            floatingMessage.alpha -= 0.01;
            if (floatingMessage.alpha < 0) floatingMessage.alpha = 0;
        }

        if (bossFloatingMessage.alpha > 0) {
            bossFloatingMessage.timer -= deltaSec;
            if (bossFloatingMessage.timer <= 0) {
                bossFloatingMessage.alpha = 0;
            } else {
                bossFloatingMessage.alpha = Math.min(1.0, bossFloatingMessage.timer / 1.5);
            }
        }

        const displayTimeLeft = Math.max(0, Math.floor(gameState.timeLeft));
        timerSpan.innerText = displayTimeLeft + '秒';
        fishSecondsSpan.innerText = Math.floor(gameState.fishSeconds) + '秒';
        comboSpan.innerText = gameState.comboFactor.toFixed(1) + 'x';

        drawCanvas();
        requestAnimationFrame(updateGame);
    }

    // 【核心修复】绘制上班族 - 手机只在isPhoneShow===true时绘制
    function drawWorker(ctx, charX, charY, state) {
        // === 第一层：角色身体 ===

        // 光头
        ctx.fillStyle = '#f7d9aa';
        ctx.beginPath();
        ctx.arc(charX, charY-160, 50, 0, 2*Math.PI);
        ctx.fill();

        // 浅蓝衬衫
        ctx.fillStyle = '#b4d0e0';
        ctx.beginPath();
        ctx.roundRect(charX-60, charY-120, 120, 200, 40);
        ctx.fill();

        // 藏青马甲
        ctx.fillStyle = '#2c3e50';
        ctx.beginPath();
        ctx.roundRect(charX-50, charY-110, 100, 160, 30);
        ctx.fill();

        // 红色领带
        ctx.fillStyle = '#e74c3c';
        ctx.beginPath();
        ctx.moveTo(charX-10, charY-100);
        ctx.lineTo(charX, charY-70);
        ctx.lineTo(charX+10, charY-100);
        ctx.closePath();
        ctx.fill();
        ctx.fillRect(charX-8, charY-105, 16, 10);

        // === 第二层：眼睛和表情 ===
        ctx.fillStyle = '#382010';
        if (state === 'punish') {
            // 被抓表情 - 睁大眼
            ctx.beginPath();
            ctx.arc(charX-20, charY-180, 6, 0, 2*Math.PI);
            ctx.arc(charX+20, charY-180, 6, 0, 2*Math.PI);
            ctx.fill();
            // 汗滴（用Canvas绘制代替emoji）
            ctx.fillStyle = '#87CEEB';
            ctx.beginPath();
            ctx.ellipse(charX-40, charY-205, 6, 10, 0, 0, 2*Math.PI);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(charX+20, charY-195, 6, 10, 0, 0, 2*Math.PI);
            ctx.fill();
        } else if (state === 'fish') {
            // 摸鱼表情 - 眯眯眼
            ctx.beginPath();
            ctx.arc(charX-20, charY-180, 8, 0.1, Math.PI-0.1);
            ctx.arc(charX+20, charY-180, 8, 0.1, Math.PI-0.1);
            ctx.fill();
        } else {
            // 普通表情
            ctx.beginPath();
            ctx.arc(charX-20, charY-180, 8, 0, 2*Math.PI);
            ctx.arc(charX+20, charY-180, 8, 0, 2*Math.PI);
            ctx.fill();
        }

        // === 第三层：手部/手机动作 ===
        // 【核心修复】只有isPhoneShow为true时才绘制手机
        if (isPhoneShow) {
            // 摸鱼状态 - 绘制手机
            // 手机机身
            ctx.fillStyle = '#34495e';
            ctx.beginPath();
            ctx.roundRect(charX+30, charY-150, 35, 55, 8);
            ctx.fill();

            // 手机屏幕
            ctx.fillStyle = '#e8e8e8';
            ctx.beginPath();
            ctx.roundRect(charX+33, charY-145, 29, 40, 4);
            ctx.fill();

            // 屏幕内容
            ctx.fillStyle = '#888888';
            ctx.font = 'bold 12px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('...', charX+47.5, charY-120);
            ctx.textAlign = 'left';

            // 手机按键
            ctx.fillStyle = '#b0b0b0';
            ctx.beginPath();
            ctx.arc(charX+47.5, charY-98, 4, 0, Math.PI*2);
            ctx.fill();
        }

        // === 嘴巴 ===
        ctx.strokeStyle = '#b14';
        ctx.lineWidth = 3;
        ctx.beginPath();
        if (state === 'punish') {
            ctx.moveTo(charX-15, charY-155);
            ctx.lineTo(charX+15, charY-155);
        } else if (state === 'fish') {
            ctx.arc(charX, charY-155, 12, 0.1, Math.PI-0.1);
        } else {
            ctx.arc(charX, charY-155, 10, 0, Math.PI);
        }
        ctx.stroke();
    }

    // 绘制学生
    function drawStudent(ctx, charX, charY, state) {
        ctx.fillStyle = '#f7d9aa';
        ctx.beginPath();
        ctx.arc(charX, charY-160, 50, 0, 2*Math.PI);
        ctx.fill();

        ctx.fillStyle = '#8b4513';
        ctx.beginPath();
        ctx.arc(charX-10, charY-200, 20, 0, Math.PI, true);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(charX+10, charY-200, 20, 0, Math.PI, true);
        ctx.fill();

        ctx.strokeStyle = '#2d2d2d';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(charX-20, charY-175, 12, 0, 2*Math.PI);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(charX+20, charY-175, 12, 0, 2*Math.PI);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(charX-8, charY-175);
        ctx.lineTo(charX+8, charY-175);
        ctx.stroke();

        ctx.fillStyle = '#c0d8ec';
        ctx.beginPath();
        ctx.roundRect(charX-60, charY-120, 120, 200, 40);
        ctx.fill();

        ctx.fillStyle = '#5d7a9c';
        ctx.beginPath();
        ctx.roundRect(charX-50, charY-110, 100, 160, 30);
        ctx.fill();

        // 小红花
        const flowerX = charX - 20;
        const flowerY = charY - 85;
        ctx.fillStyle = '#e74c3c';
        for (let i = 0; i < 5; i++) {
            let angle = i * (Math.PI * 2 / 5);
            let petalX = flowerX + 12 * Math.cos(angle);
            let petalY = flowerY + 12 * Math.sin(angle);
            ctx.beginPath();
            ctx.ellipse(petalX, petalY, 8, 5, angle, 0, 2 * Math.PI);
            ctx.fill();
        }
        ctx.fillStyle = '#f1c40f';
        ctx.beginPath();
        ctx.arc(flowerX, flowerY, 5, 0, 2 * Math.PI);
        ctx.fill();

        if (state === 'punish') {
            ctx.fillStyle = '#fff';
            ctx.fillRect(charX+30, charY-140, 40, 30);
            ctx.fillStyle = '#000';
            ctx.font = 'bold 18px sans-serif';
            ctx.fillText('笔记', charX+35, charY-120);
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(charX+50, charY-140);
            ctx.lineTo(charX+70, charY-160);
            ctx.stroke();
            ctx.fillStyle = '#382010';
            ctx.beginPath();
            ctx.arc(charX-20, charY-180, 6, 0, 2*Math.PI);
            ctx.arc(charX+20, charY-180, 6, 0, 2*Math.PI);
            ctx.fill();
            ctx.fillStyle = '#87CEEB';
            ctx.beginPath();
            ctx.ellipse(charX-40, charY-210, 6, 10, 0, 0, 2*Math.PI);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(charX+20, charY-200, 6, 10, 0, 0, 2*Math.PI);
            ctx.fill();
        } else if (state === 'fish') {
            // 【核心修复】学生角色的漫画也使用isPhoneShow
            if (isPhoneShow) {
                ctx.fillStyle = '#f1c40f';
                ctx.fillRect(charX+30, charY-150, 40, 50);
                ctx.fillStyle = '#000';
                ctx.font = 'bold 16px sans-serif';
                ctx.fillText('漫画', charX+35, charY-120);
            }
            ctx.fillStyle = '#382010';
            ctx.beginPath();
            ctx.arc(charX-20, charY-180, 8, 0.1, Math.PI-0.1);
            ctx.arc(charX+20, charY-180, 8, 0.1, Math.PI-0.1);
            ctx.fill();
        } else {
            ctx.fillStyle = '#382010';
            ctx.beginPath();
            ctx.arc(charX-20, charY-180, 8, 0, 2*Math.PI);
            ctx.arc(charX+20, charY-180, 8, 0, 2*Math.PI);
            ctx.fill();
        }

        ctx.strokeStyle = '#b14';
        ctx.lineWidth = 3;
        ctx.beginPath();
        if (state === 'punish') {
            ctx.moveTo(charX-15, charY-155);
            ctx.lineTo(charX+15, charY-155);
        } else if (state === 'fish') {
            ctx.arc(charX, charY-155, 12, 0.1, Math.PI-0.1);
        } else {
            ctx.arc(charX, charY-155, 10, 0, Math.PI);
        }
        ctx.stroke();
    }

    function drawCanvas() {
        // 【核心修复】每帧先完全清空画布并填充背景色
        // 这确保任何位置都不会有残影
        ctx.fillStyle = '#eaf6ff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 绘制网格背景
        for (let i=0; i<canvas.width; i+=60) {
            ctx.strokeStyle = '#c0d8ec';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(i,0); ctx.lineTo(i,canvas.height);
            ctx.stroke();
        }

        const charX = 200, charY = 280;
        let state = 'normal';
        if (gameState.punishTimer > 0) state = 'punish';
        else if (gameState.fishActive) state = 'fish';

        if (selectedRole === 'worker') {
            drawWorker(ctx, charX, charY, state);
        } else {
            drawStudent(ctx, charX, charY, state);
        }

        // 监控窗口
        const monX = 780, monY = 130;
        ctx.fillStyle = '#8b6d4c';
        roundRect(ctx, monX-60, monY-70, 150, 150, 25);
        ctx.fill();
        ctx.fillStyle = '#31261a';
        roundRect(ctx, monX-55, monY-65, 140, 140, 20);
        ctx.fill();

        let screenColor = '#abd46e';
        if (bossSystem.active && bossSystem.visible) screenColor = '#ff4d4d';
        else if (bossSystem.flickerVisible) screenColor = '#ffb3b3';
        else if (bossSystem.flickerInterval) screenColor = '#ffffff';
        ctx.fillStyle = screenColor;
        roundRect(ctx, monX-50, monY-60, 130, 130, 15);
        ctx.fill();

        if (bossSystem.active && bossSystem.visible) {
            ctx.fillStyle = '#4d2e1b';
            ctx.beginPath();
            ctx.arc(monX+15, monY, 35, 0, 2*Math.PI);
            ctx.fill();
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(monX-5, monY-10, 6, 0, 2*Math.PI);
            ctx.arc(monX+25, monY-10, 6, 0, 2*Math.PI);
            ctx.fill();
            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(monX-5, monY-10, 3, 0, 2*Math.PI);
            ctx.arc(monX+25, monY-10, 3, 0, 2*Math.PI);
            ctx.fill();
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(monX-20, monY-30);
            ctx.lineTo(monX, monY-35);
            ctx.moveTo(monX+30, monY-30);
            ctx.lineTo(monX+50, monY-35);
            ctx.stroke();
            ctx.font = 'bold 40px sans-serif';
            ctx.fillStyle = 'red';
            ctx.fillText('!', monX+45, monY-35);
        } else {
            ctx.fillStyle = '#64422e';
            ctx.beginPath();
            ctx.arc(monX+15, monY, 30, 0, 2*Math.PI);
            ctx.fill();
            ctx.fillStyle = '#f7d9aa';
            ctx.beginPath();
            ctx.ellipse(monX-5, monY-8, 6, 10, 0, 0, 2*Math.PI);
            ctx.ellipse(monX+35, monY-8, 6, 10, 0, 0, 2*Math.PI);
            ctx.fill();
        }

        if (floatingMessage.alpha > 0) {
            ctx.globalAlpha = floatingMessage.alpha;
            ctx.font = `bold ${floatingMessage.size}px 'Comic Neue', sans-serif`;
            ctx.fillStyle = '#d44c2f';
            ctx.shadowColor = '#fff';
            ctx.shadowBlur = 10;
            ctx.fillText(floatingMessage.text, floatingMessage.x, floatingMessage.y);
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1.0;
        }

        if (bossFloatingMessage.alpha > 0) {
            ctx.globalAlpha = bossFloatingMessage.alpha;
            ctx.font = `bold ${bossFloatingMessage.size}px 'Comic Neue', cursive`;
            ctx.fillStyle = '#ff4500';
            ctx.shadowColor = '#ff0';
            ctx.shadowBlur = 15;
            ctx.fillText(bossFloatingMessage.text, bossFloatingMessage.x, bossFloatingMessage.y);
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1.0;
        }

        if (gameState.gameOver) {
            ctx.fillStyle = '#000000aa';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'white';
            ctx.font = 'bold 44px Comic Neue';
            if (gameState.levelCompleted) {
                if (gameState.level === 3) {
                    ctx.fillText('🏆 恭喜通关全部!', 260, 280);
                } else {
                    ctx.fillText('🎉 通关成功!', 320, 280);
                }
            } else {
                ctx.fillText('😓 挑战失败', 350, 280);
            }
            ctx.font = '32px Comic Neue';
            ctx.fillStyle = '#ffecaa';
            ctx.fillText(`摸鱼: ${Math.floor(gameState.fishSeconds)}秒 / ${levelGoals[gameState.level-1]}秒`, 280, 350);
        }
    }

    function roundRect(ctx, x, y, w, h, r) {
        if (w < 2*r) r = w/2;
        if (h < 2*r) r = h/2;
        ctx.beginPath();
        ctx.moveTo(x+r, y);
        ctx.lineTo(x+w-r, y);
        ctx.quadraticCurveTo(x+w, y, x+w, y+r);
        ctx.lineTo(x+w, y+h-r);
        ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
        ctx.lineTo(x+r, y+h);
        ctx.quadraticCurveTo(x, y+h, x, y+h-r);
        ctx.lineTo(x, y+r);
        ctx.quadraticCurveTo(x, y, x+r, y);
        ctx.closePath();
        return ctx;
    }

    startBtn.addEventListener('click', () => {
        activateAudio();
        if (!gameState.playing && gameState.gameOver) {
            if (startBtn.innerText === '重新挑战') {
                resetGame(currentLevel);
                startGame();
            } else if (startBtn.innerText === '开始下一关') {
                resetGame(currentLevel + 1);
                startGame();
            } else {
                startGame();
            }
        } else if (!gameState.playing && !gameState.gameOver) {
            startGame();
        }
    });

    resetBtn.addEventListener('click', () => {
        activateAudio();
        resetGame(currentLevel);
        setTimeout(() => {
            startGame();
        }, 100);
    });

    // 初始化
    bindControls();
    resetGame(1);

    requestAnimationFrame(updateGame);
})();
</script>
